name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Validar Dockerfile
        run: |
          docker build -t fintech-api .