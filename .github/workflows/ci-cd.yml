name: FinTech Nova CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate Python syntax (Compilation check)
      run: |
        python -m py_compile main.py health_check.py monitor_health.py log_analyzer.py backup_db.py resource_monitor.py

    - name: Build Docker Image
      run: |
        docker build -t fintech-nova:${{ github.sha }} .
        docker build -t fintech-nova:latest .
